name: Changelog Reminder
on:
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

permissions:
  contents: read

jobs:
  changelog_reminder:
    uses: babylonlabs-io/.github/.github/workflows/reusable_changelog_reminder.yml@0adff9d36a387ebfc921621f2e6b357230f8c08e  # v0.18.1
    secrets: inherit
